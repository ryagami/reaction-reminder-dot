name: Release Module

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build module zip
        run: |
          rm -f module.zip
          zip -r module.zip module.json README.md languages scripts styles

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: module.zip
          generate_release_notes: true