name: Release Module

on:
  push:
    tags:
      - "v*"
  workflow_run:
    workflows:
      - Auto Tag From Module Version
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    if: github.event_name != 'workflow_run' || (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.name == 'Auto Tag From Module Version')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.ref }}

      - name: Resolve release tag
        id: meta
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            TAG_NAME="${{ github.ref_name }}"
          else
            VERSION=$(node -p "JSON.parse(require('fs').readFileSync('module.json', 'utf8')).version")
            TAG_NAME="v${VERSION}"
          fi
          echo "tag_name=${TAG_NAME}" >> "$GITHUB_OUTPUT"

      - name: Build module zip
        run: |
          rm -f module.zip
          zip -r module.zip module.json README.md languages scripts styles

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag_name }}
          files: module.zip
          generate_release_notes: true

      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Update module download URL for this tag
        env:
          TAG_NAME: ${{ steps.meta.outputs.tag_name }}
          REPOSITORY: ${{ github.repository }}
        run: |
          node <<'NODE'
          const fs = require("fs");

          const tag = process.env.TAG_NAME;
          const repo = process.env.REPOSITORY;
          const filePath = "module.json";

          const manifest = JSON.parse(fs.readFileSync(filePath, "utf8"));
          const expected = `https://github.com/${repo}/releases/download/${tag}/module.zip`;

          if (manifest.download === expected) {
            console.log("module.json download URL already up to date.");
            process.exit(0);
          }

          manifest.download = expected;
          fs.writeFileSync(filePath, `${JSON.stringify(manifest, null, 2)}\n`);
          console.log(`Updated module.json download URL to ${expected}`);
          NODE

      - name: Commit download URL update
        run: |
          if git diff --quiet -- module.json; then
            echo "No manifest changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add module.json
          git commit -m "chore: update module download URL for ${{ steps.meta.outputs.tag_name }}"
          git push origin main